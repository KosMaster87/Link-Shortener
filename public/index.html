<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkShort – Links</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f3f4f6;
        color: #111827;
        min-height: 100vh;
      }

      /* ── Nav ── */
      nav {
        background: #fff;
        border-bottom: 1px solid #e5e7eb;
        padding: 0 1.5rem;
        display: flex;
        align-items: center;
        gap: 2rem;
        height: 56px;
      }
      .logo {
        font-weight: 700;
        font-size: 1.1rem;
        color: #4f46e5;
        text-decoration: none;
      }
      nav a {
        text-decoration: none;
        color: #6b7280;
        font-size: 0.9rem;
        padding: 0.25rem 0;
      }
      nav a.active {
        color: #4f46e5;
        border-bottom: 2px solid #4f46e5;
      }
      nav a:hover:not(.active) {
        color: #111827;
      }
      #nav-auth {
        margin-left: auto;
      }

      /* ── Layout ── */
      main {
        max-width: 900px;
        margin: 2rem auto;
        padding: 0 1rem;
        display: grid;
        gap: 1.5rem;
      }

      /* ── Card ── */
      .card {
        background: #fff;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        padding: 1.5rem;
      }
      .card h2 {
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 1rem;
        color: #374151;
      }

      /* ── Form ── */
      .form-row {
        display: flex;
        gap: 0.5rem;
      }
      input[type="url"],
      input[type="text"] {
        flex: 1;
        border: 1px solid #d1d5db;
        border-radius: 6px;
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
        outline: none;
        transition: border-color 0.15s;
      }
      input:focus {
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px #eef2ff;
      }

      /* ── Buttons ── */
      .btn {
        border: none;
        border-radius: 6px;
        padding: 0.5rem 1rem;
        font-size: 0.85rem;
        font-weight: 500;
        cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn:hover {
        opacity: 0.85;
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: #4f46e5;
        color: #fff;
      }
      .btn-ghost {
        background: #f3f4f6;
        color: #374151;
      }
      .btn-danger {
        background: #fee2e2;
        color: #b91c1c;
      }
      .btn-sm {
        padding: 0.3rem 0.6rem;
        font-size: 0.8rem;
      }

      /* ── Result ── */
      #result {
        display: none;
        margin-top: 1rem;
      }
      .result-box {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: #eef2ff;
        border: 1px solid #c7d2fe;
        border-radius: 6px;
        padding: 0.6rem 0.75rem;
      }
      .result-box a {
        color: #4f46e5;
        font-weight: 500;
        font-size: 0.9rem;
        text-decoration: none;
        flex: 1;
      }
      .result-box a:hover {
        text-decoration: underline;
      }
      .error-msg {
        color: #b91c1c;
        font-size: 0.85rem;
        margin-top: 0.5rem;
      }

      /* ── Table ── */
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.875rem;
      }
      th {
        text-align: left;
        padding: 0.6rem 0.75rem;
        background: #f9fafb;
        border-bottom: 1px solid #e5e7eb;
        font-weight: 600;
        color: #6b7280;
        white-space: nowrap;
      }
      td {
        padding: 0.7rem 0.75rem;
        border-bottom: 1px solid #f3f4f6;
        vertical-align: middle;
      }
      tr:last-child td {
        border-bottom: none;
      }
      tr:hover td {
        background: #fafafa;
      }

      .code {
        font-family: monospace;
        font-weight: 600;
        color: #4f46e5;
      }
      .url-cell {
        max-width: 240px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        color: #6b7280;
      }

      .badge {
        display: inline-block;
        padding: 0.2rem 0.5rem;
        border-radius: 9999px;
        font-size: 0.75rem;
        font-weight: 500;
      }
      .badge-active {
        background: #dcfce7;
        color: #15803d;
      }
      .badge-inactive {
        background: #f3f4f6;
        color: #6b7280;
      }

      .actions {
        display: flex;
        gap: 0.3rem;
        flex-wrap: wrap;
      }

      .edit-row input {
        width: 100%;
      }

      .empty {
        text-align: center;
        padding: 2rem;
        color: #9ca3af;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <nav>
      <a href="/" class="logo">LinkShort</a>
      <a href="/" class="active">Links</a>
      <a href="/dashboard.html">Dashboard</a>
      <span id="nav-auth"></span>
    </nav>

    <main>
      <!-- Erstellen -->
      <div class="card">
        <h2>Neuen Link kürzen</h2>
        <form id="create-form">
          <div class="form-row">
            <input
              type="url"
              id="url-input"
              placeholder="https://beispiel.de/sehr-langer-link"
              required
            />
            <button type="submit" class="btn btn-primary">Link kürzen</button>
          </div>
          <div id="result">
            <div class="result-box">
              <a id="result-link" href="" target="_blank"></a>
              <button
                type="button"
                class="btn btn-ghost btn-sm"
                id="copy-result-btn"
              >
                Kopieren
              </button>
            </div>
          </div>
          <p id="create-error" class="error-msg" style="display: none"></p>
        </form>
      </div>

      <!-- Tabelle -->
      <div class="card">
        <h2>Alle Links</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Code</th>
                <th>Original-URL</th>
                <th>Klicks</th>
                <th>Status</th>
                <th>Aktionen</th>
              </tr>
            </thead>
            <tbody id="links-body">
              <tr>
                <td colspan="5" class="empty">Lädt…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script>
      const origin = window.location.origin;

      // ── Auth ─────────────────────────────────────────────────────────────────

      const getToken = () => localStorage.getItem("ls_token");
      const authHeaders = () => {
        const t = getToken();
        return t ? { Authorization: `Bearer ${t}` } : {};
      };
      const redirectToLogin = () => {
        localStorage.removeItem("ls_token");
        window.location.href = "/login.html";
      };
      const showForbidden = (inlineErrorEl = null) => {
        const msg = "Keine Berechtigung für diese Aktion.";
        if (inlineErrorEl) {
          inlineErrorEl.textContent = msg;
          inlineErrorEl.style.display = "block";
          return;
        }
        alert(msg);
      };
      const handleWriteAuthStatus = (res, inlineErrorEl = null) => {
        if (res.status === 401) {
          redirectToLogin();
          return true;
        }
        if (res.status === 403) {
          showForbidden(inlineErrorEl);
          return true;
        }
        return false;
      };
      function updateNav() {
        const navAuth = document.getElementById("nav-auth");
        if (getToken()) {
          navAuth.innerHTML =
            '<button id="logout-btn" class="btn btn-ghost btn-sm">Abmelden</button>';
          document
            .getElementById("logout-btn")
            .addEventListener("click", redirectToLogin);
        } else {
          navAuth.innerHTML = '<a href="/login.html">Anmelden</a>';
        }
      }

      // ── API helpers ──────────────────────────────────────────────────────────

      const api = {
        getLinks: () => fetch("/api/links").then((r) => r.json()),
        getStats: (code) =>
          fetch(`/api/links/${code}/stats`).then((r) => r.json()),
        createLink: (url) =>
          fetch("/api/links", {
            method: "POST",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ url }),
          }),
        deleteLink: (code) =>
          fetch(`/api/links/${code}`, {
            method: "DELETE",
            headers: authHeaders(),
          }),
        toggleLink: (code) =>
          fetch(`/api/links/${code}/toggle`, {
            method: "PATCH",
            headers: authHeaders(),
          }),
        updateLink: (code, url) =>
          fetch(`/api/links/${code}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json", ...authHeaders() },
            body: JSON.stringify({ url }),
          }),
      };

      const shortUrl = (code) => `${origin}/${code}`;

      async function copyText(text, btn) {
        await navigator.clipboard.writeText(text);
        const orig = btn.textContent;
        btn.textContent = "Kopiert!";
        setTimeout(() => {
          btn.textContent = orig;
        }, 1500);
      }

      // ── Tabelle rendern ──────────────────────────────────────────────────────

      async function loadLinks() {
        const tbody = document.getElementById("links-body");
        try {
          const links = await api.getLinks();
          const statsAll = await Promise.all(
            links.map((l) =>
              api.getStats(l.code).catch(() => ({ totalClicks: "–" })),
            ),
          );

          if (links.length === 0) {
            tbody.innerHTML = `<tr><td colspan="5" class="empty">Noch keine Links vorhanden.</td></tr>`;
            return;
          }

          tbody.innerHTML = links
            .map((link, i) => renderRow(link, statsAll[i].totalClicks))
            .join("");
          attachRowHandlers();
        } catch {
          tbody.innerHTML = `<tr><td colspan="5" class="empty">Fehler beim Laden.</td></tr>`;
        }
      }

      function renderRow(link, clicks) {
        const badge = link.isActive
          ? `<span class="badge badge-active">aktiv</span>`
          : `<span class="badge badge-inactive">deaktiviert</span>`;

        return `
          <tr data-code="${link.code}" data-url="${escHtml(link.originalUrl)}">
            <td><span class="code">${link.code}</span></td>
            <td><span class="url-cell" title="${escHtml(link.originalUrl)}">${escHtml(link.originalUrl)}</span></td>
            <td>${clicks}</td>
            <td>${badge}</td>
            <td>
              <div class="actions">
                <button class="btn btn-ghost btn-sm js-copy">Kopieren</button>
                <button class="btn btn-ghost btn-sm js-edit">Bearbeiten</button>
                <button class="btn btn-ghost btn-sm js-toggle">${link.isActive ? "Deaktivieren" : "Aktivieren"}</button>
                <button class="btn btn-danger btn-sm js-delete">Löschen</button>
              </div>
            </td>
          </tr>`;
      }

      function renderEditRow(code, url) {
        return `
          <tr data-code="${code}" class="edit-row">
            <td><span class="code">${code}</span></td>
            <td colspan="3">
              <input type="url" class="js-edit-input" value="${escHtml(url)}" required />
            </td>
            <td>
              <div class="actions">
                <button class="btn btn-primary btn-sm js-save">Speichern</button>
                <button class="btn btn-ghost btn-sm js-cancel">Abbrechen</button>
              </div>
            </td>
          </tr>`;
      }

      function attachRowHandlers() {
        document
          .querySelectorAll("#links-body tr[data-code]")
          .forEach((row) => {
            const code = row.dataset.code;
            const url = row.dataset.url;

            row.querySelector(".js-copy")?.addEventListener("click", (e) => {
              copyText(shortUrl(code), e.currentTarget);
            });

            row.querySelector(".js-edit")?.addEventListener("click", () => {
              row.outerHTML = renderEditRow(code, url);
              attachEditHandlers();
            });

            row
              .querySelector(".js-toggle")
              ?.addEventListener("click", async () => {
                const res = await api.toggleLink(code);
                if (handleWriteAuthStatus(res)) return;
                loadLinks();
              });

            row
              .querySelector(".js-delete")
              ?.addEventListener("click", async () => {
                if (!confirm(`Link "${code}" wirklich löschen?`)) return;
                const res = await api.deleteLink(code);
                if (handleWriteAuthStatus(res)) return;
                loadLinks();
              });
          });
      }

      function attachEditHandlers() {
        document.querySelectorAll(".edit-row").forEach((row) => {
          const code = row.dataset.code;

          row.querySelector(".js-save")?.addEventListener("click", async () => {
            const input = row.querySelector(".js-edit-input");
            if (!input.reportValidity()) return;
            const res = await api.updateLink(code, input.value);
            if (handleWriteAuthStatus(res)) return;
            if (!res.ok) {
              alert("Ungültige URL.");
              return;
            }
            loadLinks();
          });

          row.querySelector(".js-cancel")?.addEventListener("click", () => {
            loadLinks();
          });
        });
      }

      // ── Link erstellen ───────────────────────────────────────────────────────

      document
        .getElementById("create-form")
        .addEventListener("submit", async (e) => {
          e.preventDefault();
          const urlInput = document.getElementById("url-input");
          const errorEl = document.getElementById("create-error");
          const resultEl = document.getElementById("result");
          const resultLink = document.getElementById("result-link");
          const submitBtn = e.target.querySelector("[type=submit]");

          errorEl.style.display = "none";
          resultEl.style.display = "none";
          submitBtn.disabled = true;

          if (!getToken()) {
            errorEl.textContent = "Bitte zuerst anmelden.";
            errorEl.style.display = "block";
            submitBtn.disabled = false;
            return;
          }

          try {
            const res = await api.createLink(urlInput.value);
            if (handleWriteAuthStatus(res, errorEl)) return;
            const data = await res.json();

            if (!res.ok) {
              errorEl.textContent =
                data.error === "INVALID_URL"
                  ? "Ungültige URL – bitte http:// oder https:// voranstellen."
                  : "Alias bereits vergeben.";
              errorEl.style.display = "block";
              return;
            }

            const short = shortUrl(data.code);
            resultLink.href = short;
            resultLink.textContent = short;
            resultEl.style.display = "block";
            urlInput.value = "";
            loadLinks();
          } finally {
            submitBtn.disabled = false;
          }
        });

      document
        .getElementById("copy-result-btn")
        .addEventListener("click", (e) => {
          copyText(
            document.getElementById("result-link").href,
            e.currentTarget,
          );
        });

      // ── Helpers ──────────────────────────────────────────────────────────────

      function escHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      // ── Init ─────────────────────────────────────────────────────────────────

      updateNav();
      loadLinks();
    </script>
  </body>
</html>
