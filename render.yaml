services:
  - type: web
    name: linkshort
    runtime: node
    plan: free
    autoDeploy: true # Deploy automatisch bei jedem Push auf main
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      # ── App ──────────────────────────────────────────────────────────────
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 22

      # ── Auth ─────────────────────────────────────────────────────────────
      # generateValue: Render erstellt beim ersten Deploy automatisch einen
      # sicheren Zufallswert – kein manuelles Setzen nötig.
      - key: JWT_SECRET
        generateValue: true

      # ── Datenbank (Neon) ──────────────────────────────────────────────────
      # sync: false = Wert wird NICHT aus render.yaml gelesen.
      # Muss manuell im Render Dashboard unter Environment eingetragen werden.
      - key: DATABASE_URL
        sync: false
      - key: USE_DATABASE_URL
        value: true

      # ── Logging & Rate-Limiting ───────────────────────────────────────────
      - key: LOG_LEVEL
        value: info
      - key: RATE_LIMIT_MAX
        value: 100

      # ── Email-Notifications (Resend API) ─────────────────────────────────
      # Resend läuft über HTTPS (Port 443) – funktioniert auf Render Free.
      # RESEND_API_KEY: resend.com → API Keys → Create API Key
      # FROM_EMAIL: verifizierte Absender-Domain nötig (z.B. feedback@dev2k.org)
      # TO_EMAIL: Empfänger der Feedback-Notifications
      - key: RESEND_API_KEY # Secret – im Render Dashboard eintragen
        sync: false
      - key: FROM_EMAIL # z.B. feedback@dev2k.org
        sync: false
      - key: TO_EMAIL # Empfänger der Notifications
        sync: false
